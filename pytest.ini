[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers -v
markers =
    # ── Agrupación por módulo funcional ──────────────────────────────────────
    transversal: Pruebas transversales del aplicativo (login, logout y flujos de sesión)
    login: Pruebas del flujo de inicio de sesión (subset de transversal)
    logout: Pruebas del flujo de cierre de sesión (subset de transversal)
    # ── Clasificación por tipo de prueba ─────────────────────────────────────
    smoke: Pruebas de humo — verificación rápida de funcionalidad crítica
    regression: Pruebas de regresión — validación de comportamiento tras cambios
    # ── Marcas heredadas (compatibilidad) ────────────────────────────────────
    auth: Pruebas de autenticación (alias de transversal)
    complete: Pruebas del flujo completo de login
